name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
      - 'v_test_sse'

jobs:
  tests_arm_neon_no_rdm_i8mm:
    name: Testing ARM NEON isolated (no RDM, no I8MM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt-get install -y qemu-user gcc-aarch64-linux-gnu
      - run: rustup target add aarch64-unknown-linux-gnu
      - run: |
          mkdir -p .cargo
          echo '\n' >> .cargo/config.toml
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - run: |
          set -e
          failed=0
  
          # Build once, get test list from the binary directly
          RUSTFLAGS="-C target-feature=+neon,-rdm" \
          cargo +nightly test --lib --features "neon,rdm,nightly_i8mm" --target aarch64-unknown-linux-gnu --no-run 2>&1
  
          TEST_BINARY=$(find target/aarch64-unknown-linux-gnu/debug/deps -name "pic_scale-*" -type f ! -name "*.d" | head -1)
          echo "Test binary: $TEST_BINARY"
  
          TEST_LIST=$(qemu-aarch64 -cpu cortex-a53 "$TEST_BINARY" --list 2>/dev/null | grep ': test' | sed 's/: test//')
          echo "Found tests: $(echo "$TEST_LIST" | wc -l)"
  
          echo "$TEST_LIST" | while read test; do
              echo "Running: $test"
              output=$(qemu-aarch64 -cpu cortex-a53 "$TEST_BINARY" "$test" --exact 2>&1)
              echo "$output" | grep -E "FAILED|ok|signal 4"
              if echo "$output" | grep -qE "FAILED|signal 4"; then
                  failed=1
              fi
          done
          exit $failed