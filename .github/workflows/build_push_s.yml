name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
      - 'v_test_sse'

jobs:
  tests_arm_neon_no_rdm_i8mm:
    name: Testing ARM NEON isolated (no RDM, no I8MM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt-get install -y qemu-user gcc-aarch64-linux-gnu
      - run: rustup target add aarch64-unknown-linux-gnu
      - run: |
          mkdir -p .cargo
          echo >> .cargo/config.toml
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - run: |
      - run: |
          set -e
          failed=0
          cargo +nightly test --lib --features "neon,rdm,nightly_i8mm" -- --list 2>/dev/null | grep ': test' | sed 's/: test//' | while read test; do
              echo "Running: $test"
              output=$(RUSTFLAGS="-C target-feature=+neon,-rdm" \
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER="qemu-aarch64 -cpu cortex-a53" \
              CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="qemu-aarch64 -cpu cortex-a53" \
              cargo +nightly test --lib --features "neon,rdm,nightly_i8mm" -- "$test" --exact 2>&1)
              echo "$output" | grep -E "FAILED|ok|signal 4"
              if echo "$output" | grep -qE "FAILED|signal 4"; then
                  failed=1
              fi
          done
          exit $failed
